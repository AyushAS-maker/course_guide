<!DOCTYPE html>
<html>
<head>

<title>AI Course Recommender</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f5f7fb;">

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand mb-0 h1">AI Course Recommender</span>
</div>
</nav>


<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow-lg p-4">

<h4 class="text-center mb-4">Find Courses For Your Skills</h4>

<form action="/recommend" method="post">

<div class="mb-3">
<label class="form-label">Skill you want to develop</label>
<input type="text" class="form-control" name="desired_skill"
placeholder="Artificial Intelligence">
</div>

<div class="mb-3">
<label class="form-label">Skills you already have</label>
<input type="text" class="form-control" name="current_skills"
placeholder="Python, Statistics">
</div>

<div class="mb-3">
<label class="form-label">Level</label>

<select class="form-control" name="level">
<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>
</select>

</div>

<div class="mb-3">
<label class="form-label">Duration</label>

<select class="form-control" name="duration">
<option value="1-3 months">1-3 months</option>
<option value="3-4 months">3-4 months</option>
<option value="5-6 months">5-6 months</option>
</select>

</div>

<button class="btn btn-primary w-100">Get Recommendations</button>

</form>

</div>

</div>

</div>



{% if courses %}

<div class="container mt-5">

<h3>Recommended Courses</h3>

<div class="row">

{% for course in courses %}

<div class="col-md-4">

<div class="card shadow-sm p-3 mb-3">

<h6>{{ course['course'] }}</h6>

<p style="color:orange;">⭐ {{ course['rating'] }}</p>

</div>

</div>

{% endfor %}

</div>

</div>

{% endif %}



</body>
</html>
